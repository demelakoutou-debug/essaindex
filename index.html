<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Mini-Bot Public API v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff444f; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #ccc; margin-top: 20px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn { background: #ff444f; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #e03a44; }
        .btn-logout { background: #555; margin-left: 10px; }
        
        /* Panneau de trading style DTrader */
        .panel-trading { background: #222; padding: 15px; border-radius: 6px; margin-top: 15px; border: 1px solid #2a2a2a; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; color: #aaa; }
        select, input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-size: 15px; }
        select:focus, input:focus { border-color: #ff444f; outline: none; }
        .trade-actions { display: flex; gap: 15px; margin-top: 15px; }
        .btn-trade { flex: 1; padding: 15px; font-size: 18px; text-transform: uppercase; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-rise { background: #2e7d32; }
        .btn-rise:hover { background: #1b5e20; }
        .btn-fall { background: #c62828; }
        .btn-fall:hover { background: #b71c1c; }

        #log-box { background: #000; color: #0f0; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; border-radius: 4px; margin-top: 15px; font-size: 13px; border: 1px solid #333; }
        .status { font-weight: bold; padding: 5px; display: inline-block; border-radius: 3px; }
        .online { background: #2e7d32; }
        .offline { background: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deriv Bot Hub (API v2 Hybride REST/WS)</h2>
    
    <div>
        <p>Statut WebSocket : <span id="status" class="status offline">Déconnecté</span></p>
        <button id="auth-btn" class="btn">Se connecter avec Deriv</button>
        <button id="logout-btn" class="btn btn-logout" style="display:none;">Déconnexion</button>
    </div>

    <div id="trading-panel" class="panel-trading" style="display: none;">
        <h3>Configuration de l'ordre</h3>
        
        <div class="form-group">
            <label for="account-select">Sélection du Compte (Nomenclature DOT / ROT)</label>
            <select id="account-select">
                </select>
        </div>

        <div class="form-group">
            <label for="trade-stake">Stake ($)</label>
            <input type="number" id="trade-stake" value="1.00" step="0.5" min="0.35">
        </div>

        <div class="trade-actions">
            <button id="btn-rise" class="btn-trade btn-rise">▲ Rise</button>
            <button id="btn-fall" class="btn-trade btn-fall">▼ Fall</button>
        </div>
    </div>

    <h3>Flux de Marché & Logs d'exécution</h3>
    <div id="log-box">Initialisation du système...</div>
</div>

<script>
    const CLIENT_ID = '33wQvUCQCGhOHXHJACSpO'; 
    const REDIRECT_URI = 'https://demelakoutou-debug.github.io/essaindex/'; 

    const authBtn = document.getElementById('auth-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const tradingPanel = document.getElementById('trading-panel');
    const accountSelect = document.getElementById('account-select');
    const stakeInput = document.getElementById('trade-stake');
    const btnRise = document.getElementById('btn-rise');
    const btnFall = document.getElementById('btn-fall');
    const statusEl = document.getElementById('status');
    const logBox = document.getElementById('log-box');

    let ws = null;
    let accessToken = null;

    function log(msg, color = '#0f0') {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- OUTILS PKCE (Garde ton authenticité de départ) ---
    function generateRandomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
        let text = '';
        for (let i = 0; i < length; i++) {
            text += possible.charAt(Math.floor(Math.random() * possible.length));
        }
        return text;
    }

    async function generateCodeChallenge(codeVerifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(codeVerifier);
        const digest = await window.crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    // --- BOUTON DE CONNEXION OAUTH2 RECORRIGÉ ---
    authBtn.addEventListener('click', async () => {
        const state = generateRandomString(16);
        const codeVerifier = generateRandomString(64);
        const codeChallenge = await generateCodeChallenge(codeVerifier);

        sessionStorage.setItem('oauth_state', state);
        sessionStorage.setItem('oauth_verifier', codeVerifier);

        const scope = 'trade';

        const oauthUrl = `https://auth.deriv.com/oauth2/auth` + 
                         `?response_type=code` +
                         `&client_id=${CLIENT_ID}` +
                         `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                         `&scope=${scope}` +
                         `&state=${state}` +
                         `&code_challenge=${codeChallenge}` +
                         `&code_challenge_method=S256`;

        log("Redirection vers la mire d'autorisation officielle...", "#ffea00");
        window.location.href = oauthUrl;
    });

    // --- DÉCONNEXION ---
    logoutBtn.addEventListener('click', () => {
        sessionStorage.clear();
        localStorage.clear();
        window.location.href = REDIRECT_URI;
    });

    // --- ÉTAPE 1 & 2 : RÉCUPÉRATION ET ENREGISTREMENT DES COMPTES (REST) ---
    async function fetchDerivAccounts() {
        log("Récupération de la liste des comptes de trading via l'API REST...", "#ffea00");
        try {
            const response = await fetch('https://api.derivws.com/trading/v1/options/accounts', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Deriv-App-ID': CLIENT_ID
                }
            });

            if (!response.ok) {
                throw new Error(`Erreur HTTP : ${response.status}`);
            }

            const accounts = await response.json();
            accountSelect.innerHTML = "";

            if (!accounts || accounts.length === 0) {
                log("Aucun compte actif trouvé. Tentative de création d'un compte de test...", "#ffea00");
                // Optionnel : Étape 2 automatique si aucun compte n'est retourné
                await createDerivAccount('demo');
                return fetchDerivAccounts(); // Recharge la liste
            }

            accounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.account_id; // Cet ID sert pour l'appel OTP
                
                let label = acc.account_type === 'demo' ? "Démo (DOT)" : "Réel (ROT)";
                option.text = `${label} - ${acc.account_id} (${acc.currency || 'USD'})`;
                accountSelect.appendChild(option);
            });

            // Afficher l'interface de trading
            tradingPanel.style.display = 'block';

            // Établir directement la connexion pour le premier compte de la liste
            if(accountSelect.value) {
                switchAccountSession(accountSelect.value);
            }

        } catch (error) {
            log(`Impossible de récupérer vos comptes : ${error.message}`, "#ff1744");
        }
    }

    // ÉTAPES UNIQUE 2 : CRÉATION DU COMPTE SI ABSENT
    async function createDerivAccount(type) {
        try {
            await fetch('https://api.derivws.com/trading/v1/options/accounts', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Deriv-App-ID': CLIENT_ID,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ currency: "USD", group: "row", account_type: type })
            });
        } catch(e) {
            console.error("Erreur création compte préventif", e);
        }
    }

    // --- ÉTAPE 3 & 4 : DEMANDE DE L'OTP ET OUVERTURE DE LA WEBSOCKET PRIVÉE ---
    async function switchAccountSession(accountId) {
        if (ws) {
            log("Fermeture de la session précédente...", "#aaa");
            ws.close();
        }

        log(`Demande d'un OTP pour le compte ${accountId}...`, "#ffea00");

        try {
            const response = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accountId}/otp`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Deriv-App-ID': CLIENT_ID
                }
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `Erreur HTTP ${response.status}`);
            }

            const otpData = await response.json();
            
            // L'API renvoie l'URL WebSocket authentifiée sous la clé otpData.url
            if (otpData && otpData.url) {
                log("OTP validé. Ouverture du canal WebSocket sécurisé...", "#00e676");
                openAuthenticatedWebSocket(otpData.url);
            } else {
                throw new Error("L'API n'a renvoyé aucune URL valide.");
            }

        } catch (error) {
            log(`Échec de la bascule de session (OTP) : ${error.message}`, "#ff1744");
        }
    }

    // --- OUVERTURE DE LA WS AUTHENTIFIÉE SANS ENVOI DE MESSAGE 'AUTHORIZE' ---
    function openAuthenticatedWebSocket(wsUrl) {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            statusEl.className = "status online";
            statusEl.innerText = "En ligne (Sécurisé)";
            log("Connexion WebSocket établie et pré-authentifiée !", "#00e676");

            // Souscription immédiate au flux public/privé de ticks
            ws.send(JSON.stringify({ ticks: 'R_100' }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Gestion des ticks
            if (data.msg_type === 'tick' && data.tick) {
                if (Math.random() > 0.7) { 
                    log(`[${data.tick.symbol}] Prix Actuel : ${data.tick.quote}`, "#fff");
                }
            }

            // Gestion des retours d'achats (Rise / Fall)
            if (data.msg_type === 'buy') {
                if (data.error) {
                    log(`❌ Échec de la transaction : ${data.error.message}`, "#ff1744");
                } else {
                    log(`✅ Contrat validé ! ID : ${data.buy.contract_id}`, "#00e676");
                    log(`${data.buy.longcode}`, "#aaa");
                }
            }
        };

        ws.onerror = (error) => {
            log("Erreur critique détectée sur la WebSocket.", "#ff1744");
        };

        ws.onclose = () => {
            statusEl.className = "status offline";
            statusEl.innerText = "Déconnecté";
            log("WebSocket fermée.", "#ff1744");
        };
    }

    // --- GESTION DU TRADING (RISE / FALL) ---
    function placeOrder(contractType) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            log("Erreur : La WebSocket n'est pas connectée.", "#ff1744");
            return;
        }

        const stake = parseFloat(stakeInput.value);
        log(`Envoi du contrat ${contractType === 'CALL' ? 'Rise' : 'Fall'} (Stake: ${stake}$)...`, "#ffea00");

        const payload = {
            buy: 1,
            price: stake,
            parameters: {
                amount: stake,
                basis: 'stake',
                contract_type: contractType, // 'CALL' pour Rise, 'PUT' pour Fall
                currency: 'USD',
                duration: 1,
                duration_unit: 't', // Exécution en 1 tick
                symbol: 'R_100'
            }
        };

        ws.send(JSON.stringify(payload));
    }

    btnRise.addEventListener('click', () => placeOrder('CALL'));
    btnFall.addEventListener('click', () => placeOrder('PUT'));

    // --- SUR CHANGEMENT DE COMPTE DANS L'UI (SELECT) ---
    accountSelect.addEventListener('change', (e) => {
        switchAccountSession(e.target.value);
    });

    // --- INITIALISATION AU CHARGEMENT DE LA PAGE ---
    function initBot() {
        logBox.innerHTML = "";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        if (code && state) {
            const savedState = sessionStorage.getItem('oauth_state');
            if (state !== savedState) {
                log("Échec : Le paramètre state ne correspond pas.", "#ff1744");
                return;
            }
            
            log("Authentification approuvée par Deriv !", "#00e676");
            localStorage.setItem('access_token', code);
            localStorage.setItem('is_logged', 'true');
            
            window.history.replaceState({}, document.title, REDIRECT_URI);
        }

        if (localStorage.getItem('is_logged') === 'true') {
            accessToken = localStorage.getItem('access_token');
            authBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            
            // On lance l'étape 1 (REST)
            fetchDerivAccounts();
        } else {
            log("Prêt. Veuillez vous connecter avec le bouton pour démarrer l'autorisation OTP.", "#fff");
        }
    }

    initBot();
</script>

</body>
</html>
