<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Mini-Bot Public API v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff444f; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #ccc; margin-top: 20px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn { background: #ff444f; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background: #e03a44; }
        .btn-logout { background: #555; margin-left: 10px; }
        .btn-logout:hover { background: #444; }
        
        /* Boutons de Trading */
        .trade-actions { display: flex; gap: 15px; margin-top: 15px; }
        .btn-trade { flex: 1; padding: 15px; font-size: 18px; text-transform: uppercase; }
        .btn-rise { background: #2e7d32; }
        .btn-rise:hover { background: #1b5e20; }
        .btn-fall { background: #c62828; }
        .btn-fall:hover { background: #b71c1c; }
        
        /* Formulaires */
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; color: #aaa; }
        select, input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-size: 15px; }
        select:focus, input:focus { border-color: #ff444f; outline: none; }

        #log-box { background: #000; color: #0f0; padding: 15px; height: 250px; overflow-y: auto; font-family: monospace; border-radius: 4px; margin-top: 15px; font-size: 13px; border: 1px solid #333; }
        .status { font-weight: bold; padding: 5px; display: inline-block; border-radius: 3px; font-size: 14px; }
        .online { background: #2e7d32; }
        .offline { background: #c62828; }
        .panel-trading { background: #222; padding: 15px; border-radius: 6px; margin-top: 15px; border: 1px solid #2a2a2a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deriv Bot Hub (v2)</h2>
    
    <div>
        <p>Statut WebSocket : <span id="status" class="status offline">Déconnecté</span></p>
        <button id="auth-btn" class="btn">Se connecter avec Deriv</button>
        <button id="logout-btn" class="btn btn-logout" style="display:none;">Déconnexion</button>
    </div>

    <div id="trading-panel" class="panel-trading" style="display: none;">
        <h3>Configuration de l'ordre</h3>
        
        <div class="form-group">
            <label for="account-select">Sélection du Compte</label>
            <select id="account-select">
                </select>
        </div>

        <div class="form-group">
            <label for="trade-stake">Stake ($)</label>
            <input type="number" id="trade-stake" value="1.00" step="0.5" min="0.35">
        </div>

        <div class="trade-actions">
            <button id="btn-rise" class="btn btn-trade btn-rise">▲ Rise</button>
            <button id="btn-fall" class="btn btn-trade btn-fall">▼ Fall</button>
        </div>
    </div>

    <h3>Flux de Marché & Logs</h3>
    <div id="log-box">Initialisation...</div>
</div>

<script>
    const CLIENT_ID = '33wQvUCQCGhOHXHJACSpO'; 
    const REDIRECT_URI = 'https://demelakoutou-debug.github.io/essaindex/'; 

    const authBtn = document.getElementById('auth-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const tradingPanel = document.getElementById('trading-panel');
    const accountSelect = document.getElementById('account-select');
    const stakeInput = document.getElementById('trade-stake');
    const btnRise = document.getElementById('btn-rise');
    const btnFall = document.getElementById('btn-fall');
    const statusEl = document.getElementById('status');
    const logBox = document.getElementById('log-box');

    let ws = null;
    let userAccounts = []; // Stockage local des comptes détectés (DOT / ROT)

    function log(msg, color = '#0f0') {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- CONNEXION SÉCURISÉE OAUTH2 (Retour à ta méthode fonctionnelle) ---
    authBtn.addEventListener('click', () => {
        // L'URL d'authentification standard de l'application Deriv
        const oauthUrl = `https://auth.deriv.com/oauth2/auth?app_id=${CLIENT_ID}&l=fr`;
        log("Redirection vers la mire d'autorisation Deriv...", "#ffea00");
        window.location.href = oauthUrl;
    });

    // --- DÉCONNEXION ---
    logoutBtn.addEventListener('click', () => {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = REDIRECT_URI;
    });

    // --- CONNEXION PRINCIPALE WEBSOCKET ---
    function connectWebSocket() {
        log("Connexion à la WebSocket Deriv...", "#ffea00");
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${CLIENT_ID}`);

        ws.onopen = () => {
            statusEl.className = "status online";
            statusEl.innerText = "En ligne";
            log("WebSocket ouverte avec succès.", "#00e676");

            // Authentification automatique du compte actuellement sélectionné au démarrage
            const activeToken = localStorage.getItem('active_token');
            if (activeToken) {
                log("Authentification de la session en cours...", "#ffea00");
                ws.send(JSON.stringify({ authorize: activeToken }));
            }
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // 1. Réponse d'autorisation
            if (data.msg_type === 'authorize') {
                if (data.error) {
                    log(`Erreur d'autorisation : ${data.error.message}`, "#ff1744");
                    return;
                }
                log(`Session autorisée pour : ${data.authorize.email}`, "#00e676");
                
                // Souscription automatique au flux Step Index / Volatility après autorisation
                ws.send(JSON.stringify({ ticks: 'R_100' }));
            }

            // 2. Réception des Ticks
            if (data.msg_type === 'tick' && data.tick) {
                if (Math.random() > 0.7) { // Évite de saturer visuellement la boîte de logs
                    log(`[${data.tick.symbol}] Prix Spot : ${data.tick.quote}`, "#fff");
                }
            }

            // 3. Réponse suite à un achat (Rise / Fall)
            if (data.msg_type === 'buy') {
                if (data.error) {
                    log(`❌ Erreur d'achat : ${data.error.message}`, "#ff1744");
                } else {
                    log(`✅ Ordre exécuté ! ID Contrat : ${data.buy.contract_id}`, "#00e676");
                    log(`${data.buy.longcode}`, "#aaa");
                }
            }
        };

        ws.onerror = (error) => {
            log("Erreur de connexion WebSocket.", "#ff1744");
        };

        ws.onclose = () => {
            statusEl.className = "status offline";
            statusEl.innerText = "Déconnecté";
            log("Connexion WebSocket interrompue.", "#ff1744");
        };
    }

    // --- ENVOI D'ORDRE (RISE / FALL) ---
    function placeOrder(type) {
        const stake = parseFloat(stakeInput.value);
        log(`Envoi de l'ordre ${type === 'CALL' ? 'Rise' : 'Fall'} (Stake: ${stake}$)...`, "#ffea00");

        const payload = {
            buy: 1,
            price: stake,
            parameters: {
                amount: stake,
                basis: 'stake',
                contract_type: type, // 'CALL' = Rise, 'PUT' = Fall
                currency: 'USD',
                duration: 1,
                duration_unit: 't', // 1 Tick
                symbol: 'R_100'
            }
        };
        ws.send(JSON.stringify(payload));
    }

    btnRise.addEventListener('click', () => placeOrder('CALL'));
    btnFall.addEventListener('click', () => placeOrder('PUT'));

    // --- CHANGEMENT DE COMPTE VIA LE SELECT ---
    accountSelect.addEventListener('change', (e) => {
        const selectedId = e.target.value;
        const targetAccount = userAccounts.find(acc => acc.id === selectedId);
        
        if (targetAccount) {
            log(`Bascule sur le compte ${selectedId}...`, "#ffea00");
            localStorage.setItem('active_token', targetAccount.token);
            
            // Reconnexion de la WebSocket pour appliquer l'autorisation du nouveau compte sélectionné
            if (ws) ws.close();
            connectWebSocket();
        }
    });

    // --- ANALYSE DE L'URL ET INITIALISATION ---
    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Deriv renvoie les paramètres sous la forme acct1, token1, acct2, token2...
        let index = 1;
        let hasParams = false;
        let extractedAccounts = [];

        while (urlParams.get(`acct${index}`)) {
            hasParams = true;
            const id = urlParams.get(`acct${index}`);
            const token = urlParams.get(`token${index}`);
            const cur = urlParams.get(`cur${index}`) || 'USD';

            extractedAccounts.push({ id, token, cur });
            index++;
        }

        // Si on détecte de nouveaux paramètres suite à une connexion réussie
        if (hasParams) {
            localStorage.setItem('user_accounts', JSON.stringify(extractedAccounts));
            // Par défaut, le premier compte devient le compte actif
            localStorage.setItem('active_token', extractedAccounts[0].token);
            localStorage.setItem('is_logged', 'true');
            
            // Nettoyage de l'URL pour retirer les tokens visibles
            window.history.replaceState({}, document.title, REDIRECT_URI);
        }

        // Chargement de la session si l'utilisateur est connecté
        if (localStorage.getItem('is_logged') === 'true') {
            userAccounts = JSON.parse(localStorage.getItem('user_accounts')) || [];
            const activeToken = localStorage.getItem('active_token');

            authBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            tradingPanel.style.display = 'block';

            // Remplissage du menu déroulant avec la distinction DOT / ROT
            accountSelect.innerHTML = "";
            userAccounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.id;
                
                // Détection de la nomenclature DOT/ROT
                let prefixLabel = "Compte";
                if (acc.id.startsWith('DOT')) prefixLabel = "Démo (DOT)";
                if (acc.id.startsWith('ROT')) prefixLabel = "Réel (ROT)";

                option.text = `${prefixLabel} - ${acc.id} (${acc.cur})`;
                
                // Sélectionner visuellement le compte actif
                if (acc.token === activeToken) option.selected = true;

                accountSelect.appendChild(option);
            });

            // Lancement de la connexion
            connectWebSocket();
        } else {
            log("Prêt. Veuillez vous connecter pour charger vos comptes.", "#fff");
        }
    }

    init();
</script>

</body>
</html>
